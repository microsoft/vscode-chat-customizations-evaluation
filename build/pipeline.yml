trigger: none
pr: none

resources:
  repositories:
    - repository: templates
      type: github
      name: microsoft/vscode-chat-customizations-evaluation
      ref: main
      endpoint: Monaco

parameters:
  - name: publishExtension
    displayName: 🚀 Publish Extension
    type: boolean
    default: false

extends:
  template: azure-pipelines/extension/stable.yml@templates
  parameters:
    workingDirectory: vscode-chat-customizations-evaluation
    l10nSourcePaths: ./src
    buildSteps:
      - script: npm i
        displayName: Install Dependencies
        workingDirectory: vscode-chat-customizations-evaluation

      - script: npm run bundle
        displayName: Bundle for Production
        workingDirectory: vscode-chat-customizations-evaluation

    tsa:
      config:
        areaPath: "Visual Studio Code Miscellaneous Extensions"
      enabled: true

    publishExtension: ${{ parameters.publishExtension }}